<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <title>Loop Filter Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.js"></script>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; }
        .container { max-width: 1230px; margin: auto; background: white; padding: 5px 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        .grid { display: grid; gap: 12px; margin-bottom: 10px;}
        .card { background: #dddddd; border: 1px solid #334155; border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 4px; }
        input[type=range] { width: 100%; margin: 8px 0; accent-color: #38bdf8; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-family: 'Fira Code', monospace; font-size: 11px; table-layout: fixed; }
        td { border: 1px solid #334155; padding: 6px 2px; text-align: left; color: #38bdf8; overflow: hidden; }
        .spinor-display { display: flex; align-items: center; justify-content: space-around; background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #334155; }
        .spinor-col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input[type=number] { width: 60px; padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #bdc3c7; }
        .out-val { color: #4ade80; font-weight: bold; font-family: monospace; height: 24px; }
        h2 { margin: 0 0 16px 0; font-weight: 500; white-space: nowrap;}
        h1 { text-align: center; color: #2c3e50; }
        .controls { display: flex; gap: 20px; margin-bottom: 30px; background: #ecf0f1; padding: 20px; border-radius: 8px; }
        .panel { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #bdc3c7; width: 100%; cursor: pointer; }
        button { background: #3498db; color: white; border: none; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .info { font-size: 0.9em; color: #1e1f1f; margin-top: 10px; }

        .button { padding: 2px 2px; vertical-align: middle; margin: 2px; background: #38bdf8; color: #020617; border: none; border-radius: 6px; cursor: pointer; } 
        optgroup { font-weight: bold; color: #757575; }
        option { padding: 8px; color:#020617}
        option:hover { background: #e0e0e0; }
        .zoomedFrame { transform: translate(-460px, -15px) scale(0.25); margin-top:-42px; margin-left: 10px; height: 160px;}
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; align-items:center; gap:2px; place-items:center; margin-bottom:25px;">

        <div class="custom-checkbox"><div>Connect</div>
            <input id="connect" class="status-input" type="checkbox" name="connect" tabindex="-1">
            <label for="connect"><div class="status-switch" data-unchecked="Off" data-checked="On"></div></label> 
        </div>
        <div class="custom-checkbox"><div>Predictor</div>
            <input id="predict" class="status-input" type="checkbox" name="predict" tabindex="-1">
            <label for="predict"><div class="status-switch" data-unchecked="Off" data-checked="On"></div></label> 
        </div>
        <div class="custom-checkbox"><div>Scan</div>
            <input id="scan" class="status-input" type="checkbox" name="scan" tabindex="-1">
            <label for="scan"><div class="status-switch" data-unchecked="Off" data-checked="On"></div></label> 
        </div>
        <div class="custom-checkbox"><div>Scope</div>
            <input id="scope" class="status-input" type="checkbox" name="scan" tabindex="-1">
            <label for="scope"><div class="status-switch" data-unchecked="Off" data-checked="On"></div></label> 
        </div>

        <button id="scopeBtn" title="Get a sample for the scope" class="button">
            <svg width="32px" height="32px" viewBox="0 0 1.28 1.28" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#clip0_901_1551)"><path d="M1.08 0.32h0.12a0.04 0.04 0 0 1 0.04 0.04v0.84a0.04 0.04 0 0 1 -0.04 0.04H0.08a0.04 0.04 0 0 1 -0.04 -0.04V0.36a0.04 0.04 0 0 1 0.04 -0.04h0.76M0.16 1.12l0.48 -0.48 0.32 0.32V0.04m0 0 -0.16 0.16m0.16 -0.16 0.16 0.16" stroke="#000000" stroke-width="0.08" stroke-linecap="round" stroke-linejoin="round"/></g><defs><clipPath id="clip0_901_1551"><path width="32" height="32" fill="white" d="M0 0H1.28V1.28H0V0z"/></clipPath></defs></svg>
        </button>
        <button id="getVersionBtn" title="Get version description" class="button">
            <svg width="32px" height="32px" viewBox="0 0 96 96" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><title>version-history</title><g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><g id="version-history" fill="#000000"><g id="icon" transform="translate(6 8)"><path d="M49.654 0c19.884 0 36 16.116 36 36a36 36 0 0 1 -61.106 25.8l5.578 -5.733A27.998 27.998 0 1 0 21.657 36q0 1.139 0.089 2.25l7.912 -7.908L35.316 36l-17.658 17.658L0 36l5.658 -5.658 8.082 8.076a37.5 37.5 0 0 1 -0.085 -2.419A36 36 0 0 1 49.654 0M43.462 23.836l6.229 16.603 6.229 -16.603h8.546l-10.5 27.998h-8.545l-10.5 -27.998z" id="Combined-Shape"/></g></g></g></svg>
        </button>
        <button id="rebootBtn" title="Reboot device" class="button">
            <svg width="32px" height="32px" viewBox="0 0 0.64 0.64" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"  stroke-width="0.01" ><path d="M0.32 0c-0.022 0 -0.04 0.018 -0.04 0.04v0.2c0 0.022 0.018 0.04 0.04 0.04s0.04 -0.018 0.04 -0.04V0.04c0 -0.022 -0.018 -0.04 -0.04 -0.04M0.04 0.04l0.082 0.082a0.28 0.28 0 0 0 -0.053 0.322 0.28 0.28 0 0 0 0.287 0.154 0.28 0.28 0 0 0 0.238 -0.222 0.28 0.28 0 0 0 -0.133 -0.297 0.04 0.04 0 0 0 -0.04 0.069 0.2 0.2 0 0 1 0.095 0.212 0.2 0.2 0 0 1 -0.17 0.159c-0.085 0.011 -0.167 -0.033 -0.205 -0.11s-0.023 -0.169 0.038 -0.23L0.24 0.24V0.08C0.24 0.059 0.222 0.04 0.2 0.04zm0 0" fill="#2e3436"/></svg>
        </button>
      
        <h2 style="text-align: center; letter-spacing: -0.025em; flex-grow:1;">Loop Fiter Control</h2>
    </div>
    <div style="position:relative;">
        <div id="connectionStatus">DISCONNECTED</div>
    </div>
    <div class="grid">
        <div id="frameBoard" style="position: relative; transition: transform 0.2s ease; " class="zoomedFrame">
            <img src="./images/fpgaR.png" alt="Loop Filter Control" style="position:absolute ; width:1200px; border-radius:8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
            <canvas id="systemCanvas" width="1200" height="420" style="position: relative; width: 1200px; z-index:10; "></canvas>
        </div>
        <div id="zBut" style="width:40px; height:40px; background-color: rgb(22, 25, 56); border:2px solid rgb(180, 177, 177); 
        margin-left: 10px; margin-top: -75px; z-index: 200; border-radius: 8px; " ></div>
        <div class="card">
            <div class="controls">
                <div>
                    <label for="scopeSample1Select" style="color:green !important;">Scope 1</label>
                    <select id="scopeSample1Select"></select>
                </div>
                <div>
                    <label for="scopeSample2Select" style="color:blue !important;">Scope 2</label>
                    <select id="scopeSample2Select"></select>
                </div>
                <div>
                    <label for="scopeAddSelect" style="color:red !important;">Add</label>
                    <select id="scopeAddSelect">
                        <option value="none">None</option>
                        <option value="sum">Sum</option>
                        <option value="diff">Diff</option> 
                    </select>
                </div>

            </div>
            <div>
                <canvas id="scopeCanvas" width="800" height="300" style="width: 100%; height: 300px; background:#ecedee; border-radius:8px;"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="controls">

                <div><label for="paramOrder">Order</label><input type="number" id="paramOrder" value="4" min="1" step="1"></div>
                <div><label for="paramAlpha">&alpha;</label><input type="number" id="paramAlpha" value="1.0" min="1" step="0.1"></div>
                <div><label for="paramPGain">P Gain</label><input type="number" id="paramPGain" value="0.10" min="0.0" step="0.01" style="width: 70px;"></div>
                <div><label for="paramPiCorner">PI corner (KHz)</label><input type="number" id="paramPiCorner" value="0.10" min="0.0" step="0.01" style="width: 70px;"></div>
                <div><label for="paramAveragingTimer">Averaging time (nsec)</label><input type="number" id="paramAveragingTimer" value="40" min="40" step="20"></div>

                <div>
                    <label for="modeSelect">Running mode</label>
                    <select id="modeSelect"><option value="normal">Normal</option><option value="sawtooth">Scan</option></select>
                </div>
                <div>
                    <label for="inputGain">Input gain</label>
                    <input type="number" id="inputGain" value="1" min="0" step="0.1">
                </div>
                <div>
                    <label for="inputOffset">Input offset</label>
                    <input type="number" id="inputOffset" value="0" min="-1000" max="1000" step="1">
                </div>
                <div>
                    <label for="outputGain">Output gain</label>
                    <input type="number" id="outputGain" value="1" min="0" step="0.1">
                </div>
                <div>
                    <label for="outputOffset">Output offset</label>
                    <input type="number" id="outputOffset" value="0" min="-1000" max="1000" step="1">
                </div>
                <div>
                    <label for="nSamples">Smaples</label>
                    <input type="number" id="nSamples" value="512" min="10" max="3000" step="1" style="width:120px">
                </div>
            </div>    
        </div>
        <div class="card">
            <button id="dumpBtn" title="Dump registers content" class="button">
                <svg version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 32 32" style="enable-background:new 0 0 310 310;" xml:space="preserve" width="32" height="32"><path d="m31.03 16.488 -4.679 -4.679c-0.605 -0.605 -1.585 -0.605 -2.19 0l-0.935 0.935V1.548C23.226 0.693 22.533 0 21.678 0H2.064C1.209 0 0.516 0.693 0.516 1.548v24.774c0 0.855 0.693 1.548 1.548 1.548h8.774v2.581c0 0.855 0.693 1.548 1.548 1.548h4.679a1.548 1.548 0 0 0 1.095 -0.454l12.869 -12.869c0.605 -0.605 0.605 -1.585 0 -2.19M3.613 3.097h16.516v12.744l-8.837 8.837a1.524 1.524 0 0 0 -0.088 0.097H3.613zm12.812 25.806H13.936v-2.49l11.321 -11.32 2.49 2.49z"/></svg>
            </button>

            <pre id="dumpOutput" class="info"></pre>
            <div id="log"></div>
        </div>    
    </div>
</div>


<script type="module" src="main.js"></script>

</body>
</html>
