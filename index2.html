<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FPGA PID Controller</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>FPGA PID Controller</h1>

<section id="connectionPanel">
  <button id="connectBtn">Connect</button>
  <button id="disconnectBtn">Disconnect</button>
  <span id="connectionStatus">DISCONNECTED</span>
</section>

<hr>

<section id="controlPanel">
  <button id="predOnBtn">Predictor On</button>
  <button id="predOffBtn">Predictor Off</button>
</section>

<hr>

<section id="scopePanel">
  <h2>Two Register Scope</h2>
  <div>
  Reg 1 Index:
  <input id="scopeReg1" value="3">
  Reg 2 Index:
  <input id="scopeReg2" value="11">
  Samples:
  <input id="scopeSamples" value="300">
  <button id="scopeBtn">Acquire</button>
  </div>
  <canvas id="scopeCanvas" width="800" height="300"></canvas>
</section>

<hr>

<section id="dumpPanel">
  <h2>Full Register Dump</h2>
  <button id="dumpBtn">Refresh</button>
  <pre id="dumpOutput"></pre>
</section>
<script type="module" src="main.js"></script>

</body>
</html>
